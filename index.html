<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search for a city..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="locationBtn" class="location-btn" title="Use current location">📍</button>
            </div>
            <div id="recentSearches" class="recent-searches"></div>
        </section>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Current Weather Card -->
        <section id="currentWeather" class="weather-card hidden">
            <div class="weather-header">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                <button id="favoriteBtn" class="favorite-btn">♡</button>
            </div>

            <div class="weather-main">
                <div class="temperature-section">
                    <div class="temperature">
                        <span id="temperature"></span>°C
                    </div>
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather icon">
                    </div>
                </div>

                <div class="weather-description">
                    <p id="description"></p>
                    <p id="feelsLike"></p>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">💧 Humidity</span>
                    <span id="humidity" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">💨 Wind Speed</span>
                    <span id="windSpeed" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🔽 Pressure</span>
                    <span id="pressure" class="detail-value"></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">👁️ Visibility</span>
                    <span id="visibility" class="detail-value"></span>
                </div>
            </div>
        </section>

        <!-- 5-Day Forecast Section -->
        <section id="forecastSection" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecast" class="forecast-container"></div>
        </section>

        <!-- Favorites Section -->
        <section id="favoritesSection" class="favorites-section">
            <h3>Saved Locations</h3>
            <div id="favorites" class="favorites-container"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Weather Dashboard © 2024 | Powered by OpenWeatherMap API</p>
            <p class="small-text">Data updates every 10 minutes</p>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
